spring:
  application:
    name: sqladvisor-prod
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    jdbc-url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 30000
      connection-test-query: SELECT 1

server:
  port: 8080
  forward-headers-strategy: framework
  servlet:
    session:
      timeout: ${APP_SESSION_TIMEOUT_MINUTES:120}m

app:
  auth:
    enabled: ${APP_AUTH_ENABLED:false}
    local-login-enabled: ${APP_LOCAL_LOGIN_ENABLED:false}
    admin-emails: ${APP_ADMIN_EMAILS:}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      allowed-domains: ${APP_ALLOWED_GOOGLE_DOMAINS:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  file:
    path: ${LOG_PATH:/log/sqladvisor}
  level:
    root: WARN
    dbinc.sqladvisor: INFO
    org.springframework.boot: INFO
    org.springframework.jdbc: INFO

awr:
  storage:
    root: ${AWR_STORAGE_ROOT:/data/awr}
  ai:
    llm-provider: ${AWR_LLM_PROVIDER:local}
    embedding-provider: ${AWR_EMBEDDING_PROVIDER:none}
    timeout-seconds: ${AWR_AI_TIMEOUT_SECONDS:45}
    openai-api-key: ${OPENAI_API_KEY:}
    openai-chat-model: ${OPENAI_CHAT_MODEL:gpt-4.1-mini}
    openai-embedding-model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
    gemini-api-key: ${GEMINI_API_KEY:}
    gemini-chat-model: ${GEMINI_CHAT_MODEL:gemini-3.1-flash-lite}
    gemini-embedding-model: ${GEMINI_EMBEDDING_MODEL:gemini-embedding-001}
    ollama-base-url: ${OLLAMA_BASE_URL:http://host.docker.internal:11434}
    ollama-chat-model: ${OLLAMA_CHAT_MODEL:llama3.1}
    ollama-embedding-model: ${OLLAMA_EMBEDDING_MODEL:embeddinggemma}
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    anthropic-chat-model: ${ANTHROPIC_CHAT_MODEL:claude-3-5-sonnet-latest}
    xai-api-key: ${XAI_API_KEY:}
    xai-chat-model: ${XAI_CHAT_MODEL:grok-2-latest}
    cohere-api-key: ${COHERE_API_KEY:}
    cohere-rerank-model: ${COHERE_RERANK_MODEL:rerank-multilingual-v3.0}
  embedding:
    dimension: ${OPENAI_EMBEDDING_DIMENSION:1536}
    provider: ${AWR_EMBEDDING_PROVIDER:none}
  advisor:
    provider: ${AWR_LLM_PROVIDER:local}
  rag:
    top-k: ${AWR_RAG_TOP_K:8}
  worker:
    url: ${AWR_WORKER_URL:http://worker:8081}
